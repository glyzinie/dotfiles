# Default colors
[colors.primary]
background = '#e1e2e7'
foreground = '#3760bf'

# Normal colors
[colors.normal]
black = '#b4b5b9'
red = '#f52a65'
green = '#587539'
yellow = '#8c6c3e'
blue = '#2e7de9'
magenta = '#9854f1'
cyan = '#007197'
white = '#6172b0'

# Bright colors
[colors.bright]
black = '#a1a6c5'
red = '#ff4774'
green = '#5c8524'
yellow = '#a27629'
blue = '#358aff'
magenta = '#a463ff'
